<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Translate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <header>
        <h1>&#127758; AI-Translate</h1>
        <p class="subtitle">Powered by Groq AI &amp; Whisper</p>
      </header>

      <main>
        <!-- Tab menu -->
        <div class="tab-menu">
          <button class="tab-btn active" id="tabText"><span
              style="font-size:2rem;vertical-align:middle;">&#9999;&#65039;</span> Text</button>
          <button class="tab-btn" id="tabAudio"><span style="font-size:2rem;vertical-align:middle;">&#128266;</span> Audio</button>
        </div>

        <!-- Text tab content -->
        <div id="textTab" class="tab-content">
          <div class="language-bar">
            <div class="lang-group">
              <select id="textSourceLang">
                <option value="auto">Detect Language</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="ru">Russian</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="tr">Turkish</option>
                <option value="tl">Tagalog</option>
              </select>
            </div>

            <button class="swap-btn" id="textSwapBtn" title="Swap languages">&#8644;</button>

            <div class="lang-group">
              <select id="textTargetLang">
                <option value="es">Spanish</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="ru">Russian</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="tr">Turkish</option>
                <option value="tl">Tagalog</option>
              </select>
            </div>
          </div>

          <div class="panels">
            <div class="panel">
              <label for="inputText">Enter text to translate</label>
              <textarea id="inputText" placeholder="Type your text here..." rows="8"></textarea>
              <div class="panel-footer">
                <span id="charCount">0 characters</span>
              </div>
            </div>

            <div class="panel output-panel">
              <label>Translation</label>
              <div id="outputText" class="output-box">
                <span class="placeholder">Translation will appear here...</span>
              </div>
              <div class="panel-footer">
                <button class="btn btn-secondary" id="copyBtn" style="display:none">Copy</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Audio tab content -->
        <div id="audioTab" class="tab-content" style="display:none">
          <div class="language-bar">
            <div class="lang-group">
              <select id="audioSourceLang">
                <option value="auto">Detect Language</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="ru">Russian</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="tr">Turkish</option>
                <option value="tl">Tagalog</option>
              </select>
            </div>

            <div class="lang-group">
              <select id="audioTargetLang">
                <option value="es">Spanish</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="ru">Russian</option>
                <option value="hi">Hindi</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="tr">Turkish</option>
                <option value="tl">Tagalog</option>
              </select>
            </div>
          </div>

          <div class="panels">
            <div class="panel">
              <div class="audio-section">
                <h2>&#127908; Upload Audio File</h2>
                <div class="drop-zone" id="dropZone">
                  <input type="file" id="audioFile" accept="audio/*" hidden />
                  <svg class="cloud-icon" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M51.2 19.2C49.4 11.2 42.4 5 34 5C27.4 5 21.6 8.6 18.4 14C10.4 14.8 4 21.6 4 30C4 38.8 11.2 46 20 46H50C57.2 46 63 40.2 63 33C63 26.2 57.8 20.6 51.2 19.2Z"
                      stroke="#6366f1" stroke-width="2.5" fill="#1e2130" />
                    <polyline points="23,30 32,21 41,30" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"
                      stroke-linejoin="round" />
                    <line x1="32" y1="21" x2="32" y2="39" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" />
                  </svg>
                  <p class="drop-label">Click to browse <span>or drag and drop</span></p>
                  <p class="drop-sub" id="dropFileName">MP3, WAV, M4A, OGG supported</p>
                </div>
                <audio id="audioPlayer" controls style="display:none; width:100%; margin-top:12px;"></audio>
              </div>
              <label for="audioTranscript">Transcription</label>
              <textarea id="audioTranscript" placeholder="Transcription will appear here as audio plays..." rows="8"
                readonly></textarea>
            </div>

            <div class="panel output-panel">
              <label>Translation</label>
              <div id="audioOutputText" class="output-box">
                <span class="placeholder">Translation will appear here...</span>
              </div>
              <div class="panel-footer">
                <button class="btn btn-secondary" id="audioCopyBtn" style="display:none">Copy</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Spinner overlay -->
        <div id="spinner" class="spinner-overlay" style="display:none">
          <div class="spinner"></div>
          <p>Translating...</p>
        </div>
      </main>

      <footer>
        <p id="copyright"></p>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>

</html>
