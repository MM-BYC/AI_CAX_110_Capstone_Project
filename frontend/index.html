<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Language Translator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>&#127758; AI Language Translator</h1>
      <p class="subtitle">Powered by Groq AI &amp; Whisper</p>
    </header>

    <main>
      <!-- Language selectors -->
      <div class="language-bar">
        <div class="lang-group">
          <label for="sourceLanguage">Source Language</label>
          <select id="sourceLanguage">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="ru">Russian</option>
            <option value="hi">Hindi</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>

        <button class="swap-btn" id="swapBtn" title="Swap languages">&#8644;</button>

        <div class="lang-group">
          <label for="targetLanguage">Target Language</label>
          <select id="targetLanguage">
            <option value="es">Spanish</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="ru">Russian</option>
            <option value="hi">Hindi</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="tl">Tagalog</option>
          </select>
        </div>
      </div>

      <!-- Text translation panel -->
      <div class="panels">
        <div class="panel">
          <label for="inputText">Enter text to translate</label>
          <textarea
            id="inputText"
            placeholder="Type your text here..."
            rows="8"
          ></textarea>
          <div class="panel-footer">
            <span id="charCount">0 characters</span>
            <button class="btn btn-primary" id="translateBtn">Translate</button>
          </div>
        </div>

        <div class="panel output-panel">
          <label>Translation</label>
          <div id="outputText" class="output-box">
            <span class="placeholder">Translation will appear here...</span>
          </div>
          <div class="panel-footer">
            <span id="detectedLang" class="detected-lang"></span>
            <button class="btn btn-secondary" id="copyBtn" style="display:none">Copy</button>
          </div>
        </div>
      </div>

      <!-- Audio translation panel -->
      <div class="audio-section">
        <h2>&#127908; Audio Translation</h2>
        <div class="audio-controls">
          <input type="file" id="audioFile" accept="audio/*" />
          <button class="btn btn-primary" id="translateAudioBtn">Translate Audio</button>
        </div>
        <div id="audioResult" class="audio-result" style="display:none">
          <div class="result-row">
            <strong>Transcribed:</strong>
            <span id="transcribedText"></span>
          </div>
          <div class="result-row">
            <strong>Detected language:</strong>
            <span id="audioDetected"></span>
          </div>
          <div class="result-row">
            <strong>Translation:</strong>
            <span id="audioTranslation"></span>
          </div>
        </div>
      </div>

      <!-- Spinner overlay -->
      <div id="spinner" class="spinner-overlay" style="display:none">
        <div class="spinner"></div>
        <p>Translating...</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
