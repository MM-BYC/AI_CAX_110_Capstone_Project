services:
  - type: web
    name: ai-translate
    runtime: python
    buildCommand: pip install --upgrade pip setuptools && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: GROQ_API_KEY
        sync: false
